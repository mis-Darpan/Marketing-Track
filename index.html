/* login Page */
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Litpax Marketing Hub — Login</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .login-wrap {
    width: 100%;
    max-width: 420px;
    padding: 24px;
  }

  .brand {
    text-align: center;
    margin-bottom: 32px;
  }

  .brand-logo {
    width: 56px;
    height: 56px;
    background: #1a237e;
    border-radius: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
  }

  .brand-logo svg { width: 30px; height: 30px; fill: white; }

  .brand h1 {
    font-size: 22px;
    font-weight: 700;
    color: #1a237e;
    letter-spacing: -0.3px;
  }

  .brand p {
    font-size: 13px;
    color: #888;
    margin-top: 4px;
  }

  .card {
    background: white;
    border-radius: 16px;
    padding: 32px;
    box-shadow: 0 2px 20px rgba(0,0,0,0.08);
  }

  .card h2 {
    font-size: 18px;
    font-weight: 600;
    color: #1a1a2e;
    margin-bottom: 6px;
  }

  .card p {
    font-size: 13px;
    color: #888;
    margin-bottom: 28px;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }

  .pin-input {
    width: 100%;
    padding: 14px 16px;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 8px;
    text-align: center;
    border: 2px solid #e8e8e8;
    border-radius: 10px;
    outline: none;
    color: #1a237e;
    transition: border-color 0.2s;
    font-family: 'Inter', sans-serif;
  }

  .pin-input:focus { border-color: #1a237e; }

  .btn {
    width: 100%;
    padding: 14px;
    background: #1a237e;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 20px;
    transition: background 0.2s, transform 0.1s;
    font-family: 'Inter', sans-serif;
  }

  .btn:hover { background: #283593; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { background: #aaa; cursor: not-allowed; }

  .error {
    margin-top: 14px;
    padding: 10px 14px;
    background: #fff3f3;
    border: 1px solid #ffcdd2;
    border-radius: 8px;
    color: #c62828;
    font-size: 13px;
    text-align: center;
    display: none;
  }

  .hint {
    margin-top: 20px;
    padding: 12px;
    background: #f5f7ff;
    border-radius: 8px;
    font-size: 12px;
    color: #555;
    text-align: center;
    line-height: 1.7;
  }

  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="brand">
    <div class="brand-logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
      </svg>
    </div>
    <h1>Litpax Marketing Hub</h1>
    <p>Marketing Command Center</p>
  </div>

  <div class="card">
    <h2>Enter your PIN</h2>
    <p>Owner, Employee, ya Agency — sab yahan se login karte hain</p>

    <label>4-digit PIN</label>
    <input
      type="password"
      class="pin-input"
      id="pinInput"
      maxlength="4"
      placeholder="••••"
      inputmode="numeric"
    />

    <button class="btn" id="loginBtn" onclick="doLogin()">Login</button>
    <div class="error" id="errMsg">Invalid PIN. Dobara try karo.</div>

    <div class="hint">
      🔒 Owner · Employee · Marketing Agency<br>
      Apna PIN enter karo aur dashboard khulega
    </div>
  </div>
</div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbzYhshyLYchNjDuLm20MrMUTQZz-8lAbnxDJ6H6fuEs2qr884WjIAEE5Ipd9Irr_8K0rg/exec";

  document.getElementById('pinInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const pin = document.getElementById('pinInput').value.trim();
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('errMsg');

    if (pin.length < 4) {
      err.style.display = 'block';
      err.textContent = '4-digit PIN daalo.';
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Checking...';
    err.style.display = 'none';

    try {
      const res = await fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'login', pin })
      });
      const data = await res.json();

      if (data.success) {
        sessionStorage.setItem('lmh_user', JSON.stringify(data));
        if (data.role === 'owner')    window.location.href = 'owner.html';
        if (data.role === 'employee') window.location.href = 'employee.html';
        if (data.role === 'agency')   window.location.href = 'agency.html';
      } else {
        err.style.display = 'block';
        err.textContent = 'Invalid PIN. Dobara try karo.';
        btn.disabled = false;
        btn.innerHTML = 'Login';
      }
    } catch(e) {
      err.style.display = 'block';
      err.textContent = 'Network error. Internet check karo.';
      btn.disabled = false;
      btn.innerHTML = 'Login';
    }
  }
</script>
</body>
</html>
